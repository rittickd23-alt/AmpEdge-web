<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmpEdge — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ===============================
         LOGIN PAGE
  =============================== -->
  <div id="loginPage" class="login-page">
    <div class="login-left">
      <div style="position: relative; z-index: 2; text-align: center; max-width: 500px">
        <div style="font-size: 56px; margin-bottom: 20px; filter: drop-shadow(0 4px 20px rgba(41, 121, 255, 0.4))">⚡</div>
        <h1 style="font-family: var(--font-pjs); font-size: 44px; font-weight: 800; letter-spacing: -1px; margin-bottom: 16px">AmpEdge</h1>
        <p style="font-size: 18px; color: rgba(255, 255, 255, 0.7); line-height: 1.6; margin-bottom: 48px">India's Premier On-Demand<br>Electrical Services Platform</p>
      </div>
    </div>
    
    <div class="login-right">
      <div class="login-box">
        <div style="text-align: center; margin-bottom: 36px">
          <div style="width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, rgba(30, 86, 160, 0.1), rgba(41, 121, 255, 0.08)); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px">
            <i data-lucide="lock" color="#1e56a0" stroke-width="2.5"></i>
          </div>
          <h2 style="font-family: var(--font-pjs); font-size: 26px; font-weight: 800; color: var(--text-dark); margin-bottom: 8px">Admin Portal</h2>
          <p style="color: var(--text-muted); font-size: 14px">Sign in to AmpEdge Dashboard</p>
        </div>

        <form id="loginForm">
          <div class="form-group" style="margin-bottom: 24px">
            <label class="form-label">Password</label>
            <input type="password" id="adminPassword" class="form-input" required placeholder="Enter admin password" style="padding: 14px 18px; font-size: 15px;">
            <p id="loginError" style="color: var(--danger); font-size: 13px; margin-top: 8px; display: none;">Invalid password</p>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px 24px; font-size: 15px;">
            Sign In →
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===============================
         ADMIN DASHBOARD
  =============================== -->
  <div id="adminApp" class="admin-layout hidden">
    
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div style="display: flex; justify-content: space-between; align-items: center">
          <h1>⚡ AmpEdge</h1>
          <button class="hamburger" onclick="toggleSidebar()" style="color: white"><i data-lucide="x"></i></button>
        </div>
        <p>Admin Portal</p>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-link active" onclick="navigate('dashboard')"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a class="nav-link" onclick="navigate('bookings')"><i data-lucide="calendar-check"></i> Bookings</a>
        <a class="nav-link" onclick="navigate('customers')"><i data-lucide="users"></i> Customers</a>
        <a class="nav-link" onclick="navigate('payments')"><i data-lucide="credit-card"></i> Payments</a>
        <a class="nav-link" onclick="navigate('services')"><i data-lucide="wrench"></i> Services</a>
        <a class="nav-link" onclick="navigate('store')"><i data-lucide="shopping-cart"></i> Store</a>
        <a class="nav-link" onclick="navigate('analysis')"><i data-lucide="bar-chart-2"></i> Tech Analysis</a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()">
          <i data-lucide="log-out"></i> Logout
        </button>
      </div>
    </aside>

    <div class="main-content">
      <header class="top-header">
        <div style="display: flex; gap: 16px; align-items: center">
          <button class="hamburger" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
          <div class="header-search">
            <i data-lucide="search" color="#94a3b8" style="width: 18px;"></i>
            <input type="text" placeholder="Search...">
          </div>
        </div>
        <div class="header-right">
          <div class="avatar">A</div>
        </div>
      </header>

      <div class="content-area" id="mainContent">
        <!-- Content injected here by JS -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;"></div>

  <!-- App Javascript -->
  <script>
    // Initializing Lucide icons
    lucide.createIcons();

    // ============================
    // STATE & CONFIG
    // ============================
    const ADMIN_PASSWORD = "4498Rik@"; 
    
    // Default data placeholders (will populate localStorage if empty)
    const defaultServices = [
      { id: 's1', name: 'Wiring Repair', description: 'Fix faulty wires and circuits safely.', category: 'REPAIR', basePrice: 499, duration: 60, city: 'Howrah', active: true },
      { id: 's2', name: 'MCB Setup', description: 'Install distribution boards and MCBs.', category: 'INSTALLATION', basePrice: 2299, duration: 120, city: 'Howrah', active: true },
      { id: 's3', name: 'Smart Home Hub', description: 'Automated lighting and switches.', category: 'INSTALLATION', basePrice: 4999, duration: 180, city: 'Kolkata', active: true },
      { id: 's4', name: 'Emergency Visit', description: 'Quick dispatch 24/7 for urgent failures.', category: 'EMERGENCY', basePrice: 899, duration: 30, city: 'Howrah', active: true },
    ];

    const defaultProducts = [
      { id: 'p1', name: 'Havells Coral Smart Switch', description: '6A wifi-enabled smart switch.', category: 'SMART_HOME', basePrice: 349, stock: 50, active: true, image: '💡' },
      { id: 'p2', name: 'Finolex FR PVC Wire', description: '2.5sqmm 90m coil.', category: 'WIRING_MATERIALS', basePrice: 2299, stock: 35, active: true, image: '🪢' },
      { id: 'p3', name: 'Legrand Arteor USB', description: 'Fast charging wall socket.', category: 'WIRING_MATERIALS', basePrice: 1249, stock: 15, active: true, image: '🔌' },
      { id: 'p4', name: 'Philips LED Batten', description: '20W ultra slim LED tube.', category: 'LIGHTING_FIXTURES', basePrice: 449, stock: 100, active: true, image: '💡' },
      { id: 'p5', name: 'Crompton Aura Fan', description: 'Anti-dust 1200mm ceiling fan.', category: 'APPLIANCES', basePrice: 2499, stock: 20, active: true, image: '🌀' }
    ];

    // Initialize LocalStorage Data if missing
    if (!localStorage.getItem('ampedge_services')) localStorage.setItem('ampedge_services', JSON.stringify(defaultServices));
    if (!localStorage.getItem('ampedge_products')) localStorage.setItem('ampedge_products', JSON.stringify(defaultProducts));

    // ============================
    // AUTH LOGIC
    // ============================
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginPage = document.getElementById('loginPage');
    const adminApp = document.getElementById('adminApp');

    if (sessionStorage.getItem('admin_auth') === 'true') {
      showDashboard();
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const pass = document.getElementById('adminPassword').value;
      if (pass === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_auth', 'true');
        showDashboard();
      } else {
        loginError.style.display = 'block';
      }
    });

    function showDashboard() {
      loginPage.classList.add('hidden');
      adminApp.classList.remove('hidden');
      navigate('dashboard');
    }

    function logout() {
      sessionStorage.removeItem('admin_auth');
      loginPage.classList.remove('hidden');
      adminApp.classList.add('hidden');
      document.getElementById('adminPassword').value = '';
      loginError.style.display = 'none';
    }

    // ============================
    // NAVIGATION & RENDER
    // ============================
    let currentPage = 'dashboard';

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('visible');
    }

    function navigate(page) {
      currentPage = page;
      // Update nav links
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      const activeLink = Array.from(document.querySelectorAll('.nav-link')).find(l => {
        const text = l.textContent.trim().toLowerCase();
        return text.includes(page) || (page === 'analysis' && text.includes('tech'));
      });
      if(activeLink) activeLink.classList.add('active');
      
      const content = document.getElementById('mainContent');
      
      if (page === 'dashboard') content.innerHTML = renderDashboard();
      else if (page === 'bookings') content.innerHTML = renderBookings();
      else if (page === 'customers') content.innerHTML = renderCustomers();
      else if (page === 'payments') content.innerHTML = renderPayments();
      else if (page === 'services') content.innerHTML = renderServices();
      else if (page === 'store') content.innerHTML = renderStore();
      else if (page === 'analysis') content.innerHTML = renderAnalysis();
      
      lucide.createIcons();
    }

    // ============================
    // VIEWS
    // ============================
    function renderDashboard() {
      const services = JSON.parse(localStorage.getItem('ampedge_services') || '[]');
      const products = JSON.parse(localStorage.getItem('ampedge_products') || '[]');
      
      return `
        <div class="page-header" style="animation: fadeIn 0.4s">
          <div>
            <h1 class="page-title">Good Day, Admin 👋</h1>
            <p class="page-subtitle">Here is your platform overview</p>
          </div>
        </div>

        <div class="card-grid" style="animation: fadeIn 0.5s">
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #1e56a0, #2979ff)"><i data-lucide="wrench"></i></div>
            <div>
              <p style="margin:0; font-size:13px; color:var(--text-muted); font-weight:600">Active Services</p>
              <h3 style="margin:4px 0 0 0; font-size:24px; font-weight:800; font-family:var(--font-pjs)">${services.filter(s=>s.active).length}</h3>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #059669, #10b981)"><i data-lucide="shopping-cart"></i></div>
            <div>
              <p style="margin:0; font-size:13px; color:var(--text-muted); font-weight:600">Marketplace Products</p>
              <h3 style="margin:4px 0 0 0; font-size:24px; font-weight:800; font-family:var(--font-pjs)">${products.length}</h3>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #7c3aed, #a855f7)"><i data-lucide="users"></i></div>
            <div>
              <p style="margin:0; font-size:13px; color:var(--text-muted); font-weight:600">Connected Users (Demo)</p>
              <h3 style="margin:4px 0 0 0; font-size:24px; font-weight:800; font-family:var(--font-pjs)">12,450</h3>
            </div>
          </div>
        </div>
        
        <div style="background: white; border-radius: 16px; padding: 24px; margin-top: 32px; border: 1px solid var(--border); animation: fadeIn 0.6s">
          <h3 style="font-family: var(--font-pjs); margin-top: 0">Quick Reference Guide</h3>
          <p style="color: var(--text-muted); font-size: 14px; line-height: 1.6">
            Welcome to the internal web dashboard. Changes made here in the <strong>Services</strong> and <strong>Store</strong> sections are saved locally (using localStorage) and will be instantly reflected on your live website's Booking and Marketplace pages.<br><br>
            <em>Note: Because this is a static website deployment without a backend server, your administrative changes are confined to this specific browser. Connecting a database (like Firebase) would be required to sync edits across multiple devices automatically.</em>
          </p>
        </div>
      `;
    }

    // --- BOOKINGS ---
    function renderBookings() {
      let bookings = JSON.parse(localStorage.getItem('ampedge_bookings') || 'null');
      if (!bookings) {
        bookings = [
          { id: 'B-10042', date: '2026-03-22', customer: 'Rahul Sharma', service: 'Smart Home Hub', status: 'Pending', tech: 'Unassigned', amount: 5048 },
          { id: 'B-10041', date: '2026-03-21', customer: 'Amit Verma', service: 'MCB Setup', status: 'In Progress', tech: 'Suresh Y.', amount: 2348 },
          { id: 'B-10040', date: '2026-03-20', customer: 'Neha Gupta', service: 'Wiring Repair', status: 'Completed', tech: 'Ramesh K.', amount: 548 },
          { id: 'B-10039', date: '2026-03-19', customer: 'Vikas Singh', service: 'Emergency Visit', status: 'Completed', tech: 'Ramesh K.', amount: 948 },
          { id: 'B-10038', date: '2026-03-18', customer: 'Priya Patel', service: 'Fan Installation', status: 'Cancelled', tech: '-', amount: 0 },
        ];
        localStorage.setItem('ampedge_bookings', JSON.stringify(bookings));
      }

      let html = `
        <div class="page-header" style="animation: fadeIn 0.4s">
          <div>
            <h1 class="page-title">Bookings Log</h1>
            <p class="page-subtitle">Manage service requests and technician assignments</p>
          </div>
        </div>
        <div class="data-table-wrap" style="animation: fadeIn 0.5s">
          <table class="data-table">
            <thead>
              <tr>
                <th>Booking ID</th>
                <th>Service Details</th>
                <th>Customer</th>
                <th>Assigned Tech</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
      `;
      bookings.forEach(b => {
        let badgeClass = b.status === 'Completed' ? 'badge-green' : (b.status === 'Pending' ? 'badge-orange' : (b.status === 'Cancelled' ? 'badge-red' : 'badge-blue'));
        html += `
          <tr>
            <td style="font-weight:700; font-family:var(--font-pjs)">${b.id}<br><span style="font-size:11px; color:var(--text-muted); font-weight:500">${b.date}</span></td>
            <td>
              <div style="font-weight:600; color:var(--text-dark)">${b.service}</div>
              <div style="font-size:12px; color:var(--text-muted)">₹${b.amount}</div>
            </td>
            <td>${b.customer}</td>
            <td>${b.tech}</td>
            <td><span class="badge ${badgeClass}">${b.status}</span></td>
          </tr>
        `;
      });
      html += `</tbody></table></div>`;
      return html;
    }

    // --- CUSTOMERS ---
    function renderCustomers() {
      const customers = [
        { id: 'C-084', name: 'Rahul Sharma', phone: '+91 98765 43210', loc: 'Howrah', spend: 12500, orders: 4, lastActive: '2 Days Ago' },
        { id: 'C-085', name: 'Amit Verma', phone: '+91 91234 56789', loc: 'Kolkata', spend: 8900, orders: 2, lastActive: '1 Week Ago' },
        { id: 'C-086', name: 'Neha Gupta', phone: '+91 99887 76655', loc: 'Salt Lake', spend: 24500, orders: 8, lastActive: 'Today' },
        { id: 'C-087', name: 'Vikas Singh', phone: '+91 98711 22334', loc: 'Howrah', spend: 1200, orders: 1, lastActive: '1 Month Ago' },
      ];

      let html = `
        <div class="page-header" style="animation: fadeIn 0.4s">
          <div>
            <h1 class="page-title">Customer Database</h1>
            <p class="page-subtitle">View registered users and their lifetime value</p>
          </div>
        </div>
        <div class="data-table-wrap" style="animation: fadeIn 0.5s">
          <table class="data-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Contact / Location</th>
                <th>Total Spent</th>
                <th>Orders</th>
                <th>Last Active</th>
              </tr>
            </thead>
            <tbody>
      `;
      customers.forEach(c => {
        html += `
          <tr>
            <td>
              <div style="display:flex; align-items:center; gap:10px">
                <div style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#1e56a0,#2979ff); color:white; display:flex; align-items:center; justify-content:center; font-weight:700">${c.name.charAt(0)}</div>
                <div>
                  <div style="font-weight:700; color:var(--text-dark)">${c.name}</div>
                  <div style="font-size:12px; color:var(--text-muted)">${c.id}</div>
                </div>
              </div>
            </td>
            <td>
              <div style="font-weight:500; font-size:13px">${c.phone}</div>
              <div style="font-size:12px; color:var(--text-muted)">📍 ${c.loc}</div>
            </td>
            <td style="font-family:var(--font-pjs); font-weight:700; color:var(--success)">₹${c.spend.toLocaleString()}</td>
            <td>${c.orders} Jobs</td>
            <td><span class="badge badge-gray">${c.lastActive}</span></td>
          </tr>
        `;
      });
      html += `</tbody></table></div>`;
      return html;
    }

    // --- PAYMENTS ---
    function renderPayments() {
      let payments = JSON.parse(localStorage.getItem('ampedge_payments') || 'null');
      if (!payments) {
        payments = [
          { tx: 'TXN-984210', date: '2026-03-20 14:30', cust: 'Neha Gupta', amt: 548, method: 'UPI', status: 'Success' },
          { tx: 'TXN-984209', date: '2026-03-19 11:15', cust: 'Vikas Singh', amt: 948, method: 'Credit Card', status: 'Success' },
          { tx: 'TXN-984208', date: '2026-03-18 09:00', cust: 'Vishal Roy', amt: 1299, method: 'Net Banking', status: 'Refunded' },
          { tx: 'TXN-984207', date: '2026-03-17 16:45', cust: 'Sunil Das', amt: 349, method: 'UPI', status: 'Success' },
        ];
        localStorage.setItem('ampedge_payments', JSON.stringify(payments));
      }

      let html = `
        <div class="page-header" style="animation: fadeIn 0.4s">
          <div>
            <h1 class="page-title">Payment Transactions</h1>
            <p class="page-subtitle">Monitor incoming revenue and refunds</p>
          </div>
        </div>
        <div class="data-table-wrap" style="animation: fadeIn 0.5s">
          <table class="data-table">
            <thead>
              <tr>
                <th>Transaction ID</th>
                <th>Date & Time</th>
                <th>Customer Name</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
      `;
      payments.forEach(p => {
        let sc = p.status === 'Success' ? 'badge-green' : 'badge-red';
        html += `
          <tr>
            <td style="font-family:var(--font-pjs); font-size:13px; font-weight:600">${p.tx}</td>
            <td style="font-size:13px; color:var(--text-muted)">${p.date}</td>
            <td>${p.cust}</td>
            <td style="font-weight:700">₹${p.amt}</td>
            <td><span class="badge badge-gray">${p.method}</span></td>
            <td><span class="badge ${sc}">${p.status}</span></td>
          </tr>
        `;
      });
      html += `</tbody></table></div>`;
      return html;
    }

    // --- TECH ANALYSIS ---
    function renderAnalysis() {
      const bookings = JSON.parse(localStorage.getItem('ampedge_bookings') || '[]');
      const payments = JSON.parse(localStorage.getItem('ampedge_payments') || '[]');
      
      // Calculate bookings over last 5 days from today
      const today = new Date();
      const last5Days = [];
      for (let i = 4; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        // Format YYYY-MM-DD to match our mock data format
        last5Days.push(d.toISOString().split('T')[0]);
      }
      
      const dailyCounts = last5Days.map(dateStr => {
        return bookings.filter(b => b.date && b.date.startsWith(dateStr)).length;
      });
      
      const maxCount = Math.max(...dailyCounts, 5); // minimum 5 for a good scale
      
      const barHTML = last5Days.map((dateStr, i) => {
        const count = dailyCounts[i];
        const height = Math.round((count / maxCount) * 100);
        // Display generic labels, like short weekday name
        const label = new Date(dateStr).toLocaleDateString('en-US', {weekday:'short'});
        return `<div class="bar-col" style="animation: fadeUp ${0.3 + i*0.1}s;"><div class="bar-val">${count}</div><div class="bar-fill" style="height: ${height}%"></div><span class="bar-label">${label}</span></div>`;
      }).join('');
      
      // Calculate financial overview
      const totalRev = payments.reduce((sum, p) => sum + (p.status === 'Success' ? Number(p.amt) : 0), 0);
      const totalRefund = payments.reduce((sum, p) => sum + (p.status === 'Refunded' ? Number(p.amt) : 0), 0);

      let html = `
        <div class="page-header" style="animation: fadeIn 0.4s">
          <div>
            <h1 class="page-title">Technical Analysis</h1>
            <p class="page-subtitle">Dynamic platform performance and operational metrics</p>
          </div>
        </div>

        <div class="grid-2" style="animation: fadeIn 0.5s">
          <!-- Chart 1 -->
          <div class="chart-container">
            <div class="chart-header">
              <h3 class="chart-title">Recent Bookings Trend</h3>
              <p class="chart-subtitle">Daily requests over the last 5 days</p>
            </div>
            <div class="bar-chart">
              ${barHTML}
            </div>
          </div>

          <!-- Chart 2 (Financial Overview) -->
          <div class="chart-container" style="display:flex; flex-direction:column; justify-content:center">
            <div class="chart-header" style="text-align:center">
              <h3 class="chart-title">Financial Overview</h3>
              <p class="chart-subtitle">Revenue from transactions</p>
            </div>
            <div class="metric-circle" style="border-color: var(--blue)">
              <h2 style="font-size:24px; color:var(--text-dark)">₹${totalRev.toLocaleString('en-IN')}</h2>
              <span style="font-size:11px">Total Revenue</span>
            </div>
            <div style="display:flex; justify-content:space-around; margin-top:30px">
              <div style="text-align:center">
                <div style="font-size:20px; font-weight:800; color:var(--text-dark)">${payments.length}</div>
                <div style="font-size:12px; color:var(--text-muted)">Transactions</div>
              </div>
              <div style="text-align:center">
                <div style="font-size:20px; font-weight:800; color:var(--danger)">₹${totalRefund.toLocaleString('en-IN')}</div>
                <div style="font-size:12px; color:var(--text-muted)">Refunded</div>
              </div>
            </div>
          </div>
        </div>
      `;
      return html;
    }

    // --- SERVICES ---
    function renderServices() {
      const services = JSON.parse(localStorage.getItem('ampedge_services') || '[]');
      
      let html = `
        <div class="page-header" style="animation: fadeIn 0.4s">
          <div>
            <h1 class="page-title">Services Manager</h1>
            <p class="page-subtitle">Manage service listings for the booking page</p>
          </div>
          <button class="btn btn-primary" onclick="openModal('serviceModal')"><i data-lucide="plus" style="width:16px"></i> Add Service</button>
        </div>
        
        <div class="data-table-wrap" style="animation: fadeIn 0.5s">
          <table class="data-table">
            <thead>
              <tr>
                <th>Service Details</th>
                <th>Category</th>
                <th>Base Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
      `;
      
      if(services.length === 0) {
        html += `<tr><td colSpan="5" style="text-align:center; padding: 40px; color:#94a3b8">No services found.</td></tr>`;
      } else {
        services.forEach(s => {
          html += `
            <tr>
              <td>
                <div style="font-weight:700; color:var(--text-dark)">${s.name}</div>
                <div style="font-size:12px; color:var(--text-muted); margin-top:4px">${s.description}</div>
              </td>
              <td><span class="badge badge-gray">${s.category}</span></td>
              <td style="font-family:var(--font-pjs); font-weight:700; color:var(--blue-dark)">₹${s.basePrice}</td>
              <td><span class="badge ${s.active ? 'badge-green' : 'badge-red'}">${s.active ? 'Active' : 'Inactive'}</span></td>
              <td>
                <div style="display:flex; gap:8px">
                  <button class="btn-icon" style="color:var(--text-muted)" onclick="editService('${s.id}')" title="Edit"><i data-lucide="edit-2" style="width:16px"></i></button>
                  <button class="btn-icon" style="color:var(--danger)" onclick="deleteService('${s.id}')" title="Delete"><i data-lucide="trash-2" style="width:16px"></i></button>
                </div>
              </td>
            </tr>
          `;
        });
      }
      
      html += `</tbody></table></div>`;
      
      // Modal HTML
      html += `
        <div id="serviceModal" class="modal-overlay">
          <div class="modal-content">
            <div class="modal-header">
              <h3 id="serviceModalTitle">Add Service</h3>
              <button class="btn-icon" onclick="closeModal('serviceModal')"><i data-lucide="x"></i></button>
            </div>
            <form onsubmit="saveService(event)">
              <div class="modal-body">
                <input type="hidden" id="serviceId">
                <div class="form-group">
                  <label class="form-label">Service Name</label>
                  <input type="text" id="serviceName" class="form-input" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Description</label>
                  <textarea id="serviceDesc" class="form-textarea" rows="2" required></textarea>
                </div>
                <div class="grid-2">
                  <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="serviceCat" class="form-select">
                      <option value="REPAIR">Repair</option>
                      <option value="INSTALLATION">Installation</option>
                      <option value="EMERGENCY">Emergency</option>
                      <option value="COMMERCIAL">Commercial</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Base Price (₹)</label>
                    <input type="number" id="servicePrice" class="form-input" required>
                  </div>
                </div>
                <div class="grid-2">
                  <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="serviceStatus" class="form-select">
                      <option value="true">Active</option>
                      <option value="false">Inactive</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal('serviceModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Service</button>
              </div>
            </form>
          </div>
        </div>
      `;
      return html;
    }

    // --- MARKETPLACE STORE ---
    function renderStore() {
      const products = JSON.parse(localStorage.getItem('ampedge_products') || '[]');
      
      let html = `
        <div class="page-header" style="animation: fadeIn 0.4s">
          <div>
            <h1 class="page-title">Marketplace Store</h1>
            <p class="page-subtitle">Manage electrical hardware inventory</p>
          </div>
          <button class="btn btn-primary" onclick="openModal('productModal')"><i data-lucide="plus" style="width:16px"></i> Add Product</button>
        </div>
        
        <div class="data-table-wrap" style="animation: fadeIn 0.5s">
          <table class="data-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
      `;
      
      if(products.length === 0) {
        html += `<tr><td colSpan="5" style="text-align:center; padding: 40px; color:#94a3b8">No products found.</td></tr>`;
      } else {
        products.forEach(p => {
          html += `
            <tr>
              <td>
                <div style="display:flex; align-items:center; gap: 12px">
                  <div style="font-size: 24px">${p.image || '📦'}</div>
                  <div>
                    <div style="font-weight:700; color:var(--text-dark)">${p.name}</div>
                    <div style="font-size:12px; color:var(--text-muted); margin-top:4px">${p.description}</div>
                  </div>
                </div>
              </td>
              <td><span class="badge badge-gray">${p.category}</span></td>
              <td style="font-family:var(--font-pjs); font-weight:700; color:var(--blue-dark)">₹${p.basePrice}</td>
              <td>${p.stock}</td>
              <td>
                <div style="display:flex; gap:8px">
                  <button class="btn-icon" style="color:var(--text-muted)" onclick="editProduct('${p.id}')" title="Edit"><i data-lucide="edit-2" style="width:16px"></i></button>
                  <button class="btn-icon" style="color:var(--danger)" onclick="deleteProduct('${p.id}')" title="Delete"><i data-lucide="trash-2" style="width:16px"></i></button>
                </div>
              </td>
            </tr>
          `;
        });
      }
      
      html += `</tbody></table></div>`;
      
      // Modal
      html += `
        <div id="productModal" class="modal-overlay">
          <div class="modal-content">
            <div class="modal-header">
              <h3 id="productModalTitle">Add Product</h3>
              <button class="btn-icon" onclick="closeModal('productModal')"><i data-lucide="x"></i></button>
            </div>
            <form onsubmit="saveProduct(event)">
              <div class="modal-body">
                <input type="hidden" id="prodId">
                <div class="form-group">
                  <label class="form-label">Product Name</label>
                  <input type="text" id="prodName" class="form-input" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Description</label>
                  <textarea id="prodDesc" class="form-textarea" rows="2" required></textarea>
                </div>
                <div class="grid-2">
                  <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="prodCat" class="form-select">
                      <option value="WIRING_MATERIALS">Wiring Materials</option>
                      <option value="APPLIANCES">Appliances</option>
                      <option value="LIGHTING_FIXTURES">Lighting Fixtures</option>
                      <option value="SMART_HOME">Smart Home</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Emoji Icon</label>
                    <input type="text" id="prodIcon" class="form-input" placeholder="e.g. 🔌" value="📦">
                  </div>
                </div>
                <div class="grid-2">
                  <div class="form-group">
                    <label class="form-label">Price (₹)</label>
                    <input type="number" id="prodPrice" class="form-input" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Stock</label>
                    <input type="number" id="prodStock" class="form-input" value="10">
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal('productModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Product</button>
              </div>
            </form>
          </div>
        </div>
      `;
      return html;
    }

    // ============================
    // MODAL HELPERS
    // ============================
    function openModal(id) {
      document.getElementById(id).classList.add('active');
      // reset forms if adding new
      if(id === 'serviceModal' && !document.getElementById('serviceId').value) {
        document.getElementById('serviceModalTitle').textContent = "Add Service";
        document.getElementById('serviceName').value = "";
        document.getElementById('serviceDesc').value = "";
        document.getElementById('servicePrice').value = "";
      }
      if(id === 'productModal' && !document.getElementById('prodId').value) {
        document.getElementById('productModalTitle').textContent = "Add Product";
        document.getElementById('prodName').value = "";
        document.getElementById('prodDesc').value = "";
        document.getElementById('prodPrice').value = "";
      }
    }
    
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
      // clear ids
      if(id === 'serviceModal') document.getElementById('serviceId').value = "";
      if(id === 'productModal') document.getElementById('prodId').value = "";
    }

    // ============================
    // CRUD OPERATIONS
    // ============================

    // Toast
    function showToast(msg) {
      const t = document.createElement('div');
      t.style.cssText = `background: var(--success); color: white; padding: 12px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; animation: fadeIn 0.3s; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3)`;
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transition = 'opacity 0.3s';
        setTimeout(() => t.remove(), 300);
      }, 3000);
    }

    // SERVICES CRUD
    window.saveService = (e) => {
      e.preventDefault();
      const sId = document.getElementById('serviceId').value;
      const service = {
        id: sId || 's_' + Date.now(),
        name: document.getElementById('serviceName').value,
        description: document.getElementById('serviceDesc').value,
        category: document.getElementById('serviceCat').value,
        basePrice: Number(document.getElementById('servicePrice').value),
        active: document.getElementById('serviceStatus').value === 'true',
        duration: 60, city: 'Local'
      };

      let services = JSON.parse(localStorage.getItem('ampedge_services') || '[]');
      if (sId) {
        services = services.map(s => s.id === sId ? service : s);
      } else {
        services.push(service);
      }

      localStorage.setItem('ampedge_services', JSON.stringify(services));
      closeModal('serviceModal');
      navigate('services');
      showToast(sId ? "Service Updated" : "Service Added");
    };

    window.editService = (id) => {
      const services = JSON.parse(localStorage.getItem('ampedge_services') || '[]');
      const s = services.find(x => x.id === id);
      if(s) {
        document.getElementById('serviceId').value = s.id;
        document.getElementById('serviceName').value = s.name;
        document.getElementById('serviceDesc').value = s.description;
        document.getElementById('serviceCat').value = s.category;
        document.getElementById('servicePrice').value = s.basePrice;
        document.getElementById('serviceStatus').value = s.active ? "true" : "false";
        document.getElementById('serviceModalTitle').textContent = "Edit Service";
        openModal('serviceModal');
      }
    };

    window.deleteService = (id) => {
      if(confirm('Are you sure you want to delete this service?')) {
        let services = JSON.parse(localStorage.getItem('ampedge_services') || '[]');
        services = services.filter(x => x.id !== id);
        localStorage.setItem('ampedge_services', JSON.stringify(services));
        navigate('services');
        showToast("Service Deleted");
      }
    };

    // PRODUCT CRUD
    window.saveProduct = (e) => {
      e.preventDefault();
      const pId = document.getElementById('prodId').value;
      const product = {
        id: pId || 'p_' + Date.now(),
        name: document.getElementById('prodName').value,
        description: document.getElementById('prodDesc').value,
        category: document.getElementById('prodCat').value,
        basePrice: Number(document.getElementById('prodPrice').value),
        stock: Number(document.getElementById('prodStock').value),
        image: document.getElementById('prodIcon').value || '📦',
        active: true
      };

      let products = JSON.parse(localStorage.getItem('ampedge_products') || '[]');
      if (pId) {
        products = products.map(p => p.id === pId ? product : p);
      } else {
        products.push(product);
      }

      localStorage.setItem('ampedge_products', JSON.stringify(products));
      closeModal('productModal');
      navigate('store');
      showToast(pId ? "Product Updated" : "Product Added");
    };

    window.editProduct = (id) => {
      const products = JSON.parse(localStorage.getItem('ampedge_products') || '[]');
      const p = products.find(x => x.id === id);
      if(p) {
        document.getElementById('prodId').value = p.id;
        document.getElementById('prodName').value = p.name;
        document.getElementById('prodDesc').value = p.description;
        document.getElementById('prodCat').value = p.category;
        document.getElementById('prodPrice').value = p.basePrice;
        document.getElementById('prodStock').value = p.stock || 10;
        document.getElementById('prodIcon').value = p.image || '📦';
        document.getElementById('productModalTitle').textContent = "Edit Product";
        openModal('productModal');
      }
    };

    window.deleteProduct = (id) => {
      if(confirm('Are you sure you want to delete this product?')) {
        let products = JSON.parse(localStorage.getItem('ampedge_products') || '[]');
        products = products.filter(x => x.id !== id);
        localStorage.setItem('ampedge_products', JSON.stringify(products));
        navigate('store');
        showToast("Product Deleted");
      }
    };

  </script>
</body>
</html>
